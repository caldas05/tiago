# Build polytime binaries for Windows, macOS, and Linux on every version tag.
#
# Usage:
#   git tag v0.1.0
#   git push --tags
#
# 5–10 minutes later a Draft Release appears on GitHub with three assets:
# polytime-windows.zip, polytime-macos.dmg, polytime-linux.zip. Edit the
# release notes and click Publish.
name: build & release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:  # also lets you run it manually from the Actions tab

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: polytime-windows
            sep: ";"
            ext: ".exe"
          - os: macos-latest      # arm64 — Apple Silicon (M1/M2/M3/M4)
            asset: polytime-macos
            sep: ":"
            ext: ""
          - os: ubuntu-latest
            asset: polytime-linux
            sep: ":"
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install deps
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -q

      - name: Build with PyInstaller
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            # Drop --onefile on macOS so PyInstaller emits a proper
            # dist/polytime.app bundle — Gatekeeper handles app bundles much
            # more gracefully than raw Mach-O blobs.
            python -m PyInstaller --windowed --name polytime \
              --add-data "model:model" \
              --add-data "transforms:transforms" \
              --add-data "score_io:score_io" \
              app.py
          else
            python -m PyInstaller --onefile --noconsole --name polytime \
              --add-data "model${{ matrix.sep }}model" \
              --add-data "transforms${{ matrix.sep }}transforms" \
              --add-data "score_io${{ matrix.sep }}score_io" \
              app.py
          fi

      - name: Stage artifact
        shell: bash
        run: |
          mkdir staging
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            # Lay out a drag-to-install DMG: app bundle + /Applications shortcut.
            mkdir dmg_root
            cp -R "dist/polytime.app" dmg_root/
            ln -s /Applications dmg_root/Applications
            # Strip any quarantine/finder xattrs the runner may have added so
            # the bundle ships clean. Best-effort; ignore failures.
            xattr -cr dmg_root/polytime.app || true
            hdiutil create -volname polytime \
              -srcfolder dmg_root \
              -ov -format UDZO \
              staging/polytime.dmg
          else
            cp "dist/polytime${{ matrix.ext }}" staging/
            cp README.md staging/
            cp frere.mid staging/
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: staging/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # required to create a release
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package per-platform assets
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            if [[ "$name" == "polytime-macos" ]]; then
              # macOS ships the .dmg directly — no double-zip.
              cp "$dir/polytime.dmg" "${name}.dmg"
            else
              (cd "$dir" && zip -r "../${name}.zip" .)
            fi
          done
          ls -la

      - name: Create draft release with binaries
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/*.zip
            artifacts/*.dmg
